version: "3.8"

services:
  gateway:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GATEWAY_API_KEY=${GATEWAY_API_KEY}
      - KNOWLEDGE_PATH=/data/knowledge/knowledge_base.json
      - OB1_PATH=/usr/local/bin/ob1
    volumes:
      - knowledge-data:/data/knowledge
      - session-data:/data/sessions
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  knowledge-data:
  session-data:
